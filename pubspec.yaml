name: el_afrik_restaurant
description: "El Afrik Restaurant App. Developed by Azmir Khan."


version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_gen_runner: ^5.12.0
  get: ^4.7.3
  flutter_screenutil: ^5.9.3
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0
  build_runner: ^2.10.4



flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Peridot
      fonts:
        - asset: assets/fonts/peridot_pe_variable.otf

flutter_gen:
  output: lib/utils/assets_gen

flutter_native_splash:

  color: "#B0E7C6"  ##====================================[REQUIRED]==========
  image: assets/images/logo.png
  fullscreen: true
  android_12:
    # background color
    color: "#B0E7C6"
    image: assets/images/logo.png
    # center-logo background color
    icon_background_color: "#B0E7C6"
